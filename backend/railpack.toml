# Railpack build config for the FastAPI backend.
#
# Railway's reelAI service deploys from this `backend/` directory as the root,
# so this file MUST live here — not at the repo root. Railpack will not find it
# otherwise.
#
# `nixpkgs` installs system packages via Nix at build time and makes them
# available on PATH at runtime. `ffmpeg` ships `ffmpeg` + `ffprobe` together,
# which the reel ingestion pipeline uses for silencedetect, audio extraction,
# and Whisper preprocessing (see backend/app/ingestion/ffmpeg_tools.py).
[build]
nixpkgs = ["ffmpeg"]
