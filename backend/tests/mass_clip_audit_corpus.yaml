# Pinned corpus for mass_clip_audit.py.
#
# Each entry fixes a (video_id, target_query) pair so week-over-week runs
# measure exactly the same boundary cases. Deleted or re-uploaded videos
# would silently break the delta chain, so we pin IDs rather than resolve
# them via search.
#
# When adding / replacing entries:
#   1. Verify the video is publicly available AND has EN captions.
#   2. Prefer creators who ship many videos at a stable cadence (their
#      back catalog tends to stay up).
#   3. Pick a target_query that matches content genuinely discussed in
#      the video — not a topic that merely appears in the title. The
#      audit is measuring BOUNDARY quality, not retrieval quality, so
#      the picker needs real material to cut around.
#   4. content_type is used to bucket deltas. Keep the 6 existing types.
#
# Entries marked TODO-VERIFY are starter picks that must be spot-checked
# before committing the first baseline. Open the YouTube URL and confirm
# (a) the video loads and (b) EN captions exist in any form.

