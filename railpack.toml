# Railway Railpack build configuration.
#
# The FastAPI backend needs ffmpeg on PATH so the reel ingestion pipeline
# (`backend/app/ingestion/`) can run ffprobe, silencedetect, and audio extraction
# without shipping a full Dockerfile. If Railpack ever stops honoring this file,
# switch `railway.json`'s builder to `DOCKERFILE` and add a minimal Dockerfile
# that does `apt-get install -y ffmpeg` on top of python:3.12-slim.

[packages]
ffmpeg = "latest"
